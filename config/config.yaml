llm:
  provider: openai
  api_key: eb398ee5375e47e2a3de2ff5ac0e2db2.BkVvoWQNPIm0CnnU
  base_url: https://open.bigmodel.cn/api/paas/v4/
  model: glm-4.7-flash
  temperature: 0.3
  max_tokens: 4096
  context_window: 128000
  ollama:
    base_url: http://localhost:11434
    model: qwen2.5:32b
execution:
  default_timeout: 500
  max_timeout: 600
  max_retries: 3
  auto_approve_risk_levels:
  - low
  - medium
  - high
  max_consecutive_failures: 3
  parallel_workers: 2
security:
  blocked_commands:
  - rm -rf
  - dd if=
  - mkfs
  - shutdown
  - reboot
  - ':(){ :|:& };:'
  max_output_size: 1048576
  network_scope_enforcement: false
storage:
  database_path: ./data/halberdstrike.db
  projects_dir: ./data/projects
  logs_dir: ./data/logs
  reports_dir: ./data/reports
logging:
  level: INFO
  file: ./data/logs/halberdstrike.log
  console: true
